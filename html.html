<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة صيانة - OWNER BUILD</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-brown: #2c1e16;
            --copper: #b87352;
            --light-bg: #f4f0ec;
            --border-color: #8c6b5d;
        }

        * {
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .invoice-container {
            background-color: #fff;
            width: 210mm; /* A4 Width */
            min-height: 297mm; /* A4 Height */
            padding: 40px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
        }

        /* --- Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--dark-brown);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .logo-section h1 {
            margin: 0;
            color: var(--copper);
            font-size: 32px;
            font-weight: 800;
        }
        .logo-section h1 span {
            color: var(--dark-brown);
        }
        .logo-section p {
            margin: 0;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .qr-section {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .qr-section img {
            width: 80px;
            height: 80px;
            border: 2px solid var(--dark-brown);
            border-radius: 5px;
            padding: 2px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .contact-item {
            background-color: var(--dark-brown);
            color: white;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
            direction: ltr;
            text-align: right;
            border: 2px solid var(--copper);
        }

        /* --- Form Inputs --- */
        input[type="text"], input[type="number"], input[type="date"] {
            border: 1px dashed #ccc;
            padding: 5px;
            font-size: 16px;
            background: transparent;
            width: 100%;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--copper);
            background-color: #fafafa;
        }

        /* --- Invoice Info Section --- */
        .invoice-title {
            text-align: center;
            background: linear-gradient(to right, var(--dark-brown), var(--copper), var(--dark-brown));
            color: white;
            padding: 5px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background-color: var(--light-bg);
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .info-row label {
            font-weight: bold;
            color: var(--dark-brown);
            white-space: nowrap;
        }

        /* --- Table Section --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            border: 2px solid var(--border-color);
        }
        th, td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: var(--dark-brown);
            color: var(--copper);
            font-weight: bold;
            font-size: 16px;
        }
        .desc-col { width: 40%; text-align: right; }
        .qty-col { width: 15%; }
        .price-col { width: 20%; }
        .total-col { width: 25%; background-color: var(--light-bg); font-weight: bold;}

        /* --- Footer Sections --- */
        .notes-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: flex-start;
        }
        .warranty-badge {
            background: var(--copper);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            border: 2px solid var(--dark-brown);
            width: 100px;
        }
        .warranty-badge span { font-size: 24px; display: block; }
        .notes-input {
            flex-grow: 1;
        }
        textarea {
            width: 100%;
            height: 80px;
            border: 1px dashed #ccc;
            padding: 10px;
            font-size: 16px;
            resize: none;
        }

        .totals-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .total-box {
            background-color: var(--dark-brown);
            color: white;
            padding: 10px;
            display: flex;
            align-items: center;
            border-radius: 5px;
            border: 2px solid var(--copper);
        }
        .total-box label {
            width: 120px;
            font-weight: bold;
            color: var(--copper);
        }
        .total-box input {
            color: white;
            font-weight: bold;
            border: none;
            border-bottom: 1px dashed var(--copper);
        }

        .signatures {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding: 0 20px;
        }
        .sig-box {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            width: 40%;
        }
        .sig-box label { font-weight: bold; }
        .sig-box input { border-bottom: 1px solid black; border-top:none; border-left:none; border-right:none; }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            font-weight: bold;
            color: var(--dark-brown);
            padding-top: 15px;
            border-top: 2px solid var(--border-color);
        }

        /* --- Buttons --- */
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn {
            background-color: var(--dark-brown);
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover { background-color: var(--copper); }

        /* --- Print Styles --- */
        @media print {
            body { background-color: white; padding: 0; }
            .invoice-container { box-shadow: none; padding: 10px; width: 100%; }
            .controls { display: none; }
            input[type="text"], input[type="number"], input[type="date"], textarea {
                border: none !important;
                background: transparent !important;
                color: black !important;
            }
            .total-box input { color: white !important; } /* Keep total text white on print */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            /* Hide placeholder texts when printing empty fields */
            input::placeholder, textarea::placeholder { color: transparent; }
        }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center;">
        
        <div class="controls no-print">
            <button class="btn" onclick="window.print()">🖨️ طباعة / حفظ كـ PDF</button>
        </div>

        <div class="invoice-container">
            <!-- Header -->
            <div class="header">
                <div class="logo-section">
                    <h1><span>OWNER</span> BUILD</h1>
                    <p>للصيانة الشاملة</p>
                </div>
                
                <!-- إضافة الباركود هنا -->
                <div class="qr-section">
                    <img src="qr.png" alt="QR Code">
                </div>

                <div class="contact-info">
                    <div class="contact-item">📞 01149888760</div>
                    <div class="contact-item">📞 01000765385</div>
                </div>
            </div>

            <div class="invoice-title">فاتـــــورة صيانــــة</div>

            <!-- Customer Info -->
            <div class="info-grid">
                <div class="info-row">
                    <label>التاريخ :</label>
                    <input type="date" id="date">
                </div>
                <div class="info-row">
                    <label>رقم الفاتورة :</label>
                    <input type="text" id="invoice-num">
                </div>
                <div class="info-row" style="grid-column: span 2;">
                    <label>اسم العميل :</label>
                    <input type="text" id="customer-name">
                </div>
                <div class="info-row" style="grid-column: span 2;">
                    <label>العنوان :</label>
                    <input type="text" id="address">
                </div>
                <div class="info-row">
                    <label>رقم الهاتف :</label>
                    <input type="text" id="phone">
                </div>
                <div class="info-row">
                    <label>نوع المنتج :</label>
                    <input type="text" id="product-type">
                </div>
                <div class="info-row" style="grid-column: span 2;">
                    <label>رقم الجهاز / الموديل :</label>
                    <input type="text" id="model">
                </div>
            </div>

            <!-- Items Table -->
            <table>
                <thead>
                    <tr>
                        <th class="desc-col">القطعة / بيان الصيانة</th>
                        <th class="qty-col">الكمية</th>
                        <th class="price-col">سعر الوحدة</th>
                        <th class="total-col">الإجمالي</th>
                    </tr>
                </thead>
                <tbody id="items-body">
                    <!-- Rows will be calculated via JS -->
                    <script>
                        for(let i=0; i<6; i++) {
                            document.write(`
                            <tr class="item-row">
                                <td class="desc-col"><input type="text"></td>
                                <td class="qty-col"><input type="number" class="qty" min="1" oninput="calculateTotal()"></td>
                                <td class="price-col"><input type="number" class="price" min="0" oninput="calculateTotal()"></td>
                                <td class="total-col"><input type="number" class="row-total" readonly style="font-weight:bold; color:#b87352; text-align:center;"></td>
                            </tr>
                            `);
                        }
                    </script>
                </tbody>
            </table>

            <!-- Notes & Warranty -->
            <div class="notes-section">
                <div class="warranty-badge">
                    ضمان<br>
                    <span>6</span>
                    شهور
                </div>
                <div class="notes-input">
                    <label style="font-weight:bold; color:var(--dark-brown);">ملاحظات :</label>
                    <textarea placeholder="اكتب أي ملاحظات إضافية هنا..."></textarea>
                </div>
            </div>

            <!-- Totals -->
            <div class="totals-section">
                <div class="total-box">
                    <label>تكلفة المصنعية :</label>
                    <input type="number" id="labor-cost" oninput="calculateTotal()">
                </div>
                <div class="total-box">
                    <label>الإجمالي النهائي :</label>
                    <input type="number" id="final-total" readonly>
                </div>
            </div>

            <!-- Signatures -->
            <div class="signatures">
                <div class="sig-box">
                    <label>توقيع الفني :</label>
                    <input type="text">
                </div>
                <div class="sig-box">
                    <label>توقيع العميل :</label>
                    <input type="text">
                </div>
            </div>

            <!-- Footer terms -->
            <div class="footer-text">
                الضمان سارٍ لمدة 6 أشهر من تاريخ الفاتورة على قطع الغيار فقط من عيوب الصناعة
            </div>
        </div>
    </div>

    <!-- JavaScript for Calculations -->
    <script>
        function calculateTotal() {
            let finalSum = 0;
            const rows = document.querySelectorAll('.item-row');
            
            rows.forEach(row => {
                const qty = parseFloat(row.querySelector('.qty').value) || 0;
                const price = parseFloat(row.querySelector('.price').value) || 0;
                const totalInput = row.querySelector('.row-total');
                
                const rowTotal = qty * price;
                if(rowTotal > 0) {
                    totalInput.value = rowTotal;
                    finalSum += rowTotal;
                } else {
                    totalInput.value = '';
                }
            });

            const laborCost = parseFloat(document.getElementById('labor-cost').value) || 0;
            finalSum += laborCost;

            const finalTotalInput = document.getElementById('final-total');
            if(finalSum > 0) {
                finalTotalInput.value = finalSum;
            } else {
                finalTotalInput.value = '';
            }
        }
    </script>
</body>
</html>
