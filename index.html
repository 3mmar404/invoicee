<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة صيانة - OWNER BUILD</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-brown: #2c1e16;
            --copper: #b87352;
            --light-bg: #f4f0ec;
            --border-color: #8c6b5d;
        }

        * {
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #e0e0e0;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .invoice-container {
            background-color: #fff;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            margin: 0 auto;
        }

        /* --- Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--dark-brown);
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-section { text-align: center; flex: 1; min-width: 150px; }
        .logo-section h1 { margin: 0; color: var(--copper); font-size: 28px; font-weight: 800; }
        .logo-section h1 span { color: var(--dark-brown); }
        .logo-section p { margin: 0; font-weight: 600; font-size: 16px; letter-spacing: 1px; }

        .qr-section { text-align: center; flex: 1; }
        .qr-section img { width: 70px; height: 70px; border: 2px solid var(--dark-brown); border-radius: 5px; padding: 2px; }

        .contact-info { display: flex; flex-direction: column; gap: 5px; flex: 1; align-items: center; }
        .contact-item { background-color: var(--dark-brown); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; direction: ltr; text-align: center; border: 2px solid var(--copper); width: 100%; max-width: 200px;}

        /* --- Form Inputs --- */
        input[type="text"], input[type="number"], input[type="date"] {
            border: 1px dashed #ccc; padding: 8px; font-size: 15px; background: transparent; width: 100%; transition: 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--copper); background-color: #fafafa; }

        /* --- Invoice Info Section --- */
        .invoice-title { text-align: center; background: linear-gradient(to right, var(--dark-brown), var(--copper), var(--dark-brown)); color: white; padding: 5px; font-size: 18px; font-weight: bold; border-radius: 5px; margin-bottom: 15px; }

        .info-grid { display: grid; grid-template-columns: 1fr; gap: 10px; background-color: var(--light-bg); padding: 15px; border: 2px solid var(--border-color); border-radius: 5px; margin-bottom: 20px; }
        .info-row { display: flex; flex-direction: column; gap: 5px; }
        .info-row label { font-weight: bold; color: var(--dark-brown); white-space: nowrap; }

        /* --- Table Section --- */
        .table-responsive { overflow-x: auto; margin-bottom: 20px; border: 2px solid var(--border-color); }
        table { width: 100%; min-width: 600px; border-collapse: collapse; }
        th, td { border: 1px solid var(--border-color); padding: 5px; text-align: center; }
        th { background-color: var(--dark-brown); color: var(--copper); font-weight: bold; font-size: 14px; padding: 10px; }
        .desc-col { width: 45%; text-align: right; }
        .qty-col { width: 15%; }
        .price-col { width: 20%; }
        .total-col { width: 20%; background-color: var(--light-bg); font-weight: bold; }

        /* --- Footer Sections --- */
        .notes-section { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; align-items: center; }
        .warranty-badge { background: var(--copper); color: white; padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; border: 2px solid var(--dark-brown); width: 100px; flex-shrink: 0;}
        .warranty-badge span { font-size: 22px; display: block; }
        .notes-input { width: 100%; }
        textarea { width: 100%; min-height: 80px; border: 1px dashed #ccc; padding: 10px; font-size: 15px; resize: none; overflow: hidden; }

        .totals-section { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        .total-box { background-color: var(--dark-brown); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; border: 2px solid var(--copper); }
        .total-box label { font-weight: bold; color: var(--copper); font-size: 14px; white-space: nowrap;}
        .total-box input { color: white; font-weight: bold; border: none; border-bottom: 1px dashed var(--copper); text-align: center; width: 50%; }

        .signatures { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; align-items: center; }
        .sig-box { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; }
        .sig-box label { font-weight: bold; }
        .sig-box input { border-bottom: 1px solid black; border-top:none; border-left:none; border-right:none; text-align: center; }

        .footer-text { text-align: center; margin-top: 20px; font-weight: bold; color: var(--dark-brown); padding-top: 10px; border-top: 2px solid var(--border-color); font-size: 14px;}

        /* --- Buttons --- */
        .controls { text-align: center; margin-bottom: 20px; width: 100%; }
        .btn { background-color: var(--dark-brown); color: white; border: none; padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; max-width: 400px;}
        .btn:hover { background-color: var(--copper); }

        /* =========================================================
           إعدادات الطباعة الاحترافية (تم تعديلها لحل مشاكل التنسيق)
           ========================================================= */
        @media print {
            @page {
                size: A4 portrait;
                margin: 5mm; 
            }
            body { background-color: white; padding: 0; display: block; }
            .invoice-container { 
                width: 100% !important; 
                max-width: none !important; 
                padding: 15px !important; 
                box-shadow: none !important; 
                margin: 0; 
                page-break-inside: avoid;
            }
            .controls { display: none !important; }
            
            /* التخلص من حدود الخانات وجعلها كنص عادي */
            input[type="text"], input[type="number"], input[type="date"], textarea { 
                border: none !important; background: transparent !important; color: black !important; padding: 0 !important; font-size: 14px !important;
            }
            .total-box input { color: white !important; font-size: 16px !important; text-align: left; direction: ltr;} 
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            input::placeholder, textarea::placeholder { color: transparent; }
            
            /* ضبط شكل الهيدر ليكون صف واحد */
            .header { flex-direction: row; flex-wrap: nowrap; margin-bottom: 15px; padding-bottom: 10px; }
            .logo-section { text-align: right; flex: 1; }
            .qr-section { flex: 1; }
            .contact-info { flex: 1; align-items: flex-end; }
            .contact-item { max-width: 180px; font-size: 13px; padding: 3px 10px; }

            .invoice-title { margin-bottom: 15px; font-size: 16px; padding: 5px;}
            
            /* حل مشكلة تكسير السطور في قسم البيانات */
            .info-grid { grid-template-columns: 1fr 1fr; padding: 10px; margin-bottom: 15px; gap: 8px 15px; display: grid;}
            .info-row { flex-direction: row; align-items: center; justify-content: flex-start; gap: 5px; display: flex;}
            .info-row.full-width { grid-column: span 2; }
            .info-row label { margin: 0; font-size: 14px; white-space: nowrap !important; /* هذا السطر يمنع انقسام الكلمة */ }
            .info-row input { flex-grow: 1; } /* يجعل المربع يأخذ باقي المساحة دون تكسير */

            /* ضبط الجدول */
            .table-responsive { margin-bottom: 15px; border: none; overflow: visible; }
            table { border: 2px solid var(--border-color); }
            th, td { padding: 4px !important; font-size: 13px !important; } 
            
            /* حل مشكلة الملاحظات */
            .notes-section { flex-direction: row; margin-bottom: 15px; gap: 15px; align-items: flex-start; display: flex;}
            .warranty-badge { padding: 5px; width: 80px; font-size: 12px; }
            .warranty-badge span { font-size: 18px; }
            .notes-input { flex-grow: 1; display: flex; flex-direction: column; }
            .notes-input label { margin-bottom: 5px; }
            textarea { height: auto !important; min-height: 50px; overflow: hidden; /* يمنع ظهور شريط التمرير */ } 
            
            /* ضبط الإجماليات والتوقيع */
            .totals-section { grid-template-columns: 1fr 1fr; margin-bottom: 15px; gap: 15px; display: grid;}
            .total-box { padding: 5px 10px; display: flex; flex-direction: row; justify-content: space-between; align-items: center;}
            .total-box input { width: auto; }
            
            .signatures { margin-top: 15px; flex-direction: row; justify-content: space-around; display: flex;}
            .sig-box { width: auto; flex-direction: row; align-items: flex-end; gap: 10px; display: flex;}

            .hide-on-print { display: none !important; }
        }

        /* إعدادات الشاشات المتوسطة والكبيرة (الكمبيوتر) */
        @media (min-width: 768px) {
            .header { flex-wrap: nowrap; flex-direction: row; }
            .logo-section { text-align: right; }
            .contact-info { align-items: flex-end; }
            .info-grid { grid-template-columns: 1fr 1fr; }
            .info-row { flex-direction: row; }
            .info-row.full-width { grid-column: span 2; }
            .notes-section { flex-direction: row; align-items: flex-start;}
            .totals-section { grid-template-columns: 1fr 1fr; gap: 20px; }
            .signatures { flex-direction: row; justify-content: space-around; }
            .sig-box { width: auto; flex-direction: row; align-items: flex-end; gap: 10px;}
            .table-responsive { border: none; overflow: visible; }
            table { border: 2px solid var(--border-color); }
        }
    </style>
</head>

                            <td class="total-col"><input type="number" class="row-total" readonly style="font-weight:bold; color:#b87352; text-align:center;"></td>
                        </tr>
                        <tr class="item-row">
                            <td class="desc-col"><input type="text" class="desc-input"></td>
                            <td class="qty-col"><input type="number" class="qty" min="1" oninput="calculateTotal()"></td>
                            <td class="price-col"><input type="number" class="price" min="0" oninput="calculateTotal()"></td>
                            <td class="total-col"><input type="number" class="row-total" readonly style="font-weight:bold; color:#b87352; text-align:center;"></td>
                        </tr>
                        <tr class="item-row">
                            <td class="desc-col"><input type="text" class="desc-input"></td>
                            <td class="qty-col"><input type="number" class="qty" min="1" oninput="calculateTotal()"></td>
                            <td class="price-col"><input type="number" class="price" min="0" oninput="calculateTotal()"></td>
                            <td class="total-col"><input type="number" class="row-total" readonly style="font-weight:bold; color:#b87352; text-align:center;"></td>
                        </tr>
                        <tr class="item-row">
                            <td class="desc-col"><input type="text" class="desc-input"></td>
                            <td class="qty-col"><input type="number" class="qty" min="1" oninput="calculateTotal()"></td>
                            <td class="price-col"><input type="number" class="price" min="0" oninput="calculateTotal()"></td>
                            <td class="total-col"><input type="number" class="row-total" readonly style="font-weight:bold; color:#b87352; text-align:center;"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="notes-section">
                <div class="warranty-badge">
                    ضمان<br>
                    <span>6</span>
                    شهور
                </div>
                <div class="notes-input">
                    <label style="font-weight:bold; color:var(--dark-brown);">ملاحظات :</label>
                    <textarea placeholder="اكتب ملاحظاتك هنا..." oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                </div>
            </div>

            <div class="totals-section">
                <div class="total-box">
                    <label>تكلفة المصنعية :</label>
                    <input type="number" id="labor-cost" oninput="calculateTotal()">
                </div>
                <div class="total-box">
                    <label>الإجمالي النهائي :</label>
                    <input type="number" id="final-total" readonly>
                </div>
            </div>

            <div class="signatures">
                <div class="sig-box">
                    <label>توقيع الفني :</label>
                    <input type="text">
                </div>
                <div class="sig-box">
                    <label>توقيع العميل :</label>
                    <input type="text">
                </div>
            </div>

            <div class="footer-text">
                الضمان سارٍ لمدة 6 أشهر من تاريخ الفاتورة على قطع الغيار فقط من عيوب الصناعة
            </div>
        </div>
    </div>

    <script>
        function calculateTotal() {
            let finalSum = 0;
            const rows = document.querySelectorAll('.item-row');
            
            rows.forEach(row => {
                const qty = parseFloat(row.querySelector('.qty').value) || 0;
                const price = parseFloat(row.querySelector('.price').value) || 0;
                const totalInput = row.querySelector('.row-total');
                
                const rowTotal = qty * price;
                if(rowTotal > 0) {
                    totalInput.value = rowTotal;
                    finalSum += rowTotal;
                } else {
                    totalInput.value = '';
                }
            });

            const laborCost = parseFloat(document.getElementById('labor-cost').value) || 0;
            finalSum += laborCost;

            const finalTotalInput = document.getElementById('final-total');
            if(finalSum > 0) {
                finalTotalInput.value = finalSum;
            } else {
                finalTotalInput.value = '';
            }
        }

        function prepareAndPrint() {
            const rows = document.querySelectorAll('.item-row');
            
            // إخفاء الصفوف الفارغة عند الطباعة
            rows.forEach(row => {
                const desc = row.querySelector('.desc-input').value.trim();
                if (desc === "") {
                    row.classList.add('hide-on-print');
                }
            });

            // ضبط ارتفاع الملاحظات قبل الطباعة لضمان ظهور كل الكلام
            const textarea = document.querySelector('textarea');
            textarea.style.height = textarea.scrollHeight + 'px';

            window.print();
        }

        // إرجاع الصفوف الفارغة بعد انتهاء الطباعة لتعود جاهزة للاستخدام
        window.addEventListener('afterprint', () => {
            const rows = document.querySelectorAll('.item-row');
            rows.forEach(row => {
                row.classList.remove('hide-on-print');
            });
        });

    </script>
</body>
</html>
